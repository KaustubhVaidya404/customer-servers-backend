version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pipeline-service:
    build: ./pipeline-service
    container_name: pipeline-service
    environment:
      - DATABASE_URL=postgresql://postgres:root@postgres:5432/customer_db
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"


  mock-server:
    build: ./mock-server
    container_name: mock-server
    ports:
      - "3000:3000"


volumes:
  pgdata:
